<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nike Air Jordan 4 Pine Green - Detalhes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: var(--cor-fundo-site);">

    <!-- Topo Inteligente: Fecha a aba atual e retorna à vitrine limpa -->
    <header class="header" style="padding: 15px 40px;">
        <a href="#" onclick="window.close(); return false;" style="text-decoration: none; font-size: 16px; color: var(--cor-texto-escura); font-weight: bold;">❮ Voltar ao Catálogo</a>
        <img src="imagem/logo3.webp" alt="Logo AleShoes" class="logo-img">
        <div class="spacer"></div>
    </header>

    <!-- Estrutura de Detalhes do Jordan 4 -->
    <main class="product-detail-layout" style="max-width: 1200px; margin: 30px auto; padding: 20px; display: flex; flex-wrap: wrap; gap: 40px;">
        
        <!-- Lado Esquerdo: Galeria de Fotos em .jpeg sincronizada com a sua pasta -->
        <div class="product-images-gallery" style="flex: 1; min-width: 320px; display: flex; flex-direction: column; gap: 15px;">
            <!-- Foto Principal -->
            <img src="imagem/jordan4 (1).jpeg" alt="Jordan 4 Foto 1" style="width: 100%; height: auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            
            <!-- Fotos Extras dos outros ângulos -->
            <div style="display: flex; gap: 15px;">
                <img src="imagem/jordan4 (2).jpeg" alt="Jordan 4 Foto 2" style="width: calc(50% - 7.5px); height: auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                <img src="imagem/jordan4 (3).jpeg" alt="Jordan 4 Foto 3" style="width: calc(50% - 7.5px); height: auto; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
            </div>
        </div>

        <!-- Lado Direito: Informações do Tênis -->
        <div class="product-info-box" style="flex: 1; min-width: 320px; display: flex; flex-direction: column; justify-content: center;">
            <h2 style="font-size: 32px; font-weight: bold; margin-bottom: 15px; color: var(--cor-texto-escura);">Tênis Nike Air Jordan 4 Pine Green</h2>
            
            <div style="margin-bottom: 25px;">
                <p style="font-size: 36px; font-weight: bold; color: var(--cor-principal); margin-bottom: 5px;">R$ 109,90</p>
                <p style="font-size: 16px; color: #666;">Em até 12x de R$ 12,44 no cartão de crédito</p>
            </div>
            
            <!-- Grade de Tamanhos Informativa Neutra -->
            <h4 style="margin-bottom: 15px; font-size: 16px; color: var(--cor-texto-escura); font-weight: bold;">Tamanhos Disponíveis para Pedido:</h4>
            <div style="display: flex; gap: 12px; margin-bottom: 40px; flex-wrap: wrap;">
                <span style="padding: 12px 20px; border: 2px solid #ddd; color: #555; border-radius: 6px; font-weight: bold; cursor: default;">39</span>
                <span style="padding: 12px 20px; border: 2px solid #ddd; color: #555; border-radius: 6px; font-weight: bold; cursor: default;">40</span>
                <span style="padding: 12px 20px; border: 2px solid #ddd; color: #555; border-radius: 6px; font-weight: bold; cursor: default;">41</span>
                <span style="padding: 12px 20px; border: 2px solid #ddd; color: #555; border-radius: 6px; font-weight: bold; cursor: default;">42</span>
            </div>

            <!-- Botão do WhatsApp customizado para o Jordan 4 -->
            <a href="https://wa.me" target="_blank" class="whatsapp-btn" style="text-align: center; padding: 18px; font-size: 16px; border-radius: 8px; text-decoration: none;">
                Consultar Tamanho no WhatsApp
            </a>
        </div>
    </main>

    <!-- Botão Flutuante do WhatsApp Geral -->
    <a href="https://wa.me" target="_blank" class="whatsapp-flutuante">
        <img src="imagem/zap1.png" alt="WhatsApp Geral">
    </a>

</body>
</html>
